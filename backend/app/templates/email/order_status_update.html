<!DOCTYPE html>
<html>
<body style="font-family: sans-serif; color: #1a1a1a; max-width: 480px; margin: 0 auto; padding: 24px;">
  <h2 style="color: #1a3a2a;">{{ project_name }} - Order status update</h2>
  <p>Hello {{ customer_name }},</p>
  <p>Your order <strong>#{{ order_id[:8] }}</strong> status is now <strong>{{ status_label }}</strong>.</p>
  <p style="margin: 24px 0;">
    <a href="{{ orders_link }}"
       style="background:#1a3a2a; color:#fff; padding:12px 24px; border-radius:8px; text-decoration:none; font-weight:600;">
      View order
    </a>
  </p>
  <p style="font-size:12px; color:#666;">Thank you for shopping with {{ project_name }}.</p>
</body>
</html>
